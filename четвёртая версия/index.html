<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточки BEM — модульная система</title>
    
    <!-- ПОРЯДОК: common → блоки → модификаторы -->
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="cards.css">
    <link rel="stylesheet" href="card.css">
    <link rel="stylesheet" href="card-theme-orange.css">
    <link rel="stylesheet" href="card-theme-blue.css">
    <link rel="stylesheet" href="card-theme-pastel.css">
    <link rel="stylesheet" href="card-theme-radial.css">
    <link rel="stylesheet" href="footer.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">Мои карточки BEM</h1>
        <p class="header__subtitle">модульная система — добавляй новые темы легко!</p>
    </header>

    <main class="cards">
        <div class="card card_theme_orange">
            <h3 class="card__title">Карточка 1</h3>
            <p class="card__text">Градиент оранжевый стиль</p>
        </div>
        
        <div class="card card_theme_blue">
            <h3 class="card__title">Карточка 2</h3>
            <p class="card__text">Синий стиль с акцентом</p>
        </div>
        
        <div class="card card_theme_pastel">
            <h3 class="card__title">Карточка 3</h3>
            <p class="card__text">Пастельный светлый стиль</p>
        </div>
        
        <div class="card card_theme_radial">
            <h3 class="card__title">Карточка 4</h3>
            <p class="card__text">Радиальный градиент + анимация</p>
        </div>
    </main>

    <footer class="footer">
        <p class="footer__text">© 2026. BEM модульная система стилей</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
