<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Showcase</title>
    
    <!-- Модульное подключение стилей по БЭМ -->
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="cards-container.css">
    <link rel="stylesheet" href="cards-toolkit/cards.css">
    <link rel="stylesheet" href="footer.css">

    <style>
        /* Глобальная кнопка переключения темы */
        .theme-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 12px;
            background-color: var(--color-primary, #333);
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: var(--transition-base, all 0.3s ease);
        }

        .theme-toggle:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .theme-toggle:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="page">

    <!-- Интерфейс переключения состояния страницы -->
    <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">🌓</button>

    <!-- Блок-заглушка для отступа сверху -->
    <header class="header"></header>

    <!-- Главная область контента -->
    <main class="container">
        <!-- БЭМ-блок контейнера сетки -->
        <div class="cards-container" id="cardsContainer">
            <!-- Сюда script.js отрендерит карточки из массива -->
        </div>
    </main>

    <!-- Нижний блок (Footer) -->
    <footer class="footer">
        <p class="footer__text">© 2026 Minimalist UI</p>
    </footer>

    <!-- БЭМ-Шаблон карточки (Card) -->
    <template id="card-template">
        <article class="card">
            <h3 class="card__title"></h3>
            <p class="card__text"></p>
            <!-- Кнопка скрыта в CSS, но оставлена в структуре шаблона -->
            <button class="card__delete" title="Удалить карточку">×</button>
        </article>
    </template>

    <!-- Основная логика приложения -->
    <script src="script.js"></script>
</body>
</html>
