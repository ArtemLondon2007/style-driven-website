<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточки с разными стилями</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">Мои карточки</h1>
        <p class="header__subtitle">уникальных стилей с разными фонами</p>
    </header>

    <main class="cards">
        <div class="card card_theme_orange">
            <h3 class="card__title">Карточка 1</h3>
            <p class="card__text">Градиент оранжевый стиль</p>
        </div>
        <div class="card card_theme_blue">
            <h3 class="card__title">Карточка 2</h3>
            <p class="card__text">Синий стиль с акцентом</p>
        </div>
        <div class="card card_theme_pastel">
            <h3 class="card__title">Карточка 3</h3>
            <p class="card__text">Пастельный светлый стиль</p>
        </div>
        <div class="card card_theme_radial">
            <h3 class="card__title">Карточка 4</h3>
            <p class="card__text">Радиальный градиент + анимация</p>
        </div>
    </main>

    <footer class="footer">
        <p class="footer__text">© 2026. Сделано на чистом HTML + CSS</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
