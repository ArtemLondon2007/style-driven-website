<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточки с разными стилями</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Мои карточки</h1>
        <p>уникальных стиля с разными фонами</p>
    </header>

    <main class="cards-container">
        <div class="card card-1">
            <h3>Карточка 1</h3>
            <p>Градиент оранжевый стиль</p>
        </div>
        <div class="card card-2">
            <h3>Карточка 2</h3>
            <p>Синий стиль с акцентом</p>
        </div>
        <div class="card card-3">
            <h3>Карточка 3</h3>
            <p>Пастельный светлый стиль</p>
        </div>
        <div class="card card-4">
            <h3>Карточка 4</h3>
            <p>Радиальный градиент + анимация</p>
        </div>
    </main>

    <footer>
        <p>© 2026. Сделано на чистом HTML + CSS</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
